<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AODV Route Discovery Flow</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #f8f7f4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
h1 { font-size: 18px; font-weight: 500; color: #2c2c2a; margin-bottom: 4px; text-align: center; }
p.sub { font-size: 13px; color: #888780; margin-bottom: 20px; text-align: center; }
.card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.08);
  padding: 24px;
  max-width: 720px;
  width: 100%;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
svg { width: 100%; height: auto; }
@media (prefers-color-scheme: dark) {
  body { background: #1a1a18; }
  .card { background: #242422; border-color: rgba(255,255,255,0.08); }
  h1 { color: #e2e0d6; }
  p.sub { color: #888780; }
}
</style>
</head>
<body>
<h1>AODV Route Discovery Flow</h1>
<p class="sub">Implementation and Analysis of AODV Routing Protocol using AODV-UU on Linux</p>
<div class="card">
<svg viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .ts { font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; }
    .th { font-family:'Segoe UI',system-ui,sans-serif; font-size:14px; font-weight:500; }
  </style>
</defs>

<!-- Column headers -->
<rect x="30" y="20" width="130" height="40" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="95" y="40" text-anchor="middle" dominant-baseline="middle" fill="#0C447C">Node A (src)</text>
<rect x="275" y="20" width="130" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="middle" fill="#2C2C2A">Node B (relay)</text>
<rect x="520" y="20" width="130" height="40" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="585" y="40" text-anchor="middle" dominant-baseline="middle" fill="#085041">Node C (dst)</text>

<!-- Lifelines -->
<line x1="95"  y1="60" x2="95"  y2="440" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>
<line x1="340" y1="60" x2="340" y2="440" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>
<line x1="585" y1="60" x2="585" y2="440" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.5"/>

<!-- Step 1: No route at A -->
<rect x="15" y="85" width="160" height="40" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="95" y="110" text-anchor="middle" dominant-baseline="middle">
  <tspan x="95" dy="-10">Data bi chan boi NFQUEUE</tspan>
  <tspan x="95" dy="14">Do chua co route toi C</tspan>
</text>

<!-- RREQ A to B -->
<line x1="95" y1="145" x2="330" y2="145" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="215" y="138" text-anchor="middle" fill="#A32D2D">RREQ broadcast (seq++)</text>

<!-- RREQ B to C -->
<line x1="340" y1="175" x2="575" y2="175" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="458" y="168" text-anchor="middle" fill="#A32D2D">RREQ forward (TTL-1)</text>

<!-- B stores reverse route -->
<rect x="275" y="193" width="130" height="28" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="340" y="207" text-anchor="middle" dominant-baseline="middle" fill="#2C2C2A">Luu reverse route to A</text>

<!-- C receives RREQ -->
<rect x="520" y="193" width="130" height="28" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="585" y="207" text-anchor="middle" dominant-baseline="middle" fill="#085041">Nhan RREQ, gui RREP</text>

<!-- RREP C to B -->
<line x1="585" y1="245" x2="350" y2="245" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="475" y="238" text-anchor="middle" fill="#0F6E56">RREP unicast (dst_seq)</text>

<!-- RREP B to A -->
<line x1="340" y1="275" x2="105" y2="275" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="220" y="268" text-anchor="middle" fill="#0F6E56">RREP forward to A</text>

<!-- B stores forward route -->
<rect x="275" y="291" width="130" height="28" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="340" y="305" text-anchor="middle" dominant-baseline="middle" fill="#2C2C2A">Luu forward route to C</text>

<!-- A has route -->
<rect x="30" y="345" width="130" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="95" y="361" text-anchor="middle" dominant-baseline="middlel" fill="#0C447C">Route established!</text>
<text class="ts" x="95" y="375" text-anchor="middle" dominant-baseline="middle" fill="#185FA5">Gui data A to B to C</text>

<!-- Data flow -->
<line x1="95"  y1="383" x2="330" y2="395" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 3"/>
<line x1="340" y1="395" x2="575" y2="383" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6 3"/>
<text class="ts" x="340" y="415" text-anchor="middle" fill="#5f5e5a">Data packets (UDP/TCP)</text>

<!-- Legend -->
<line x1="35"  y1="443" x2="65"  y2="443" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="70" y="443" dominant-baseline="middle" fill="#5f5e5a">RREQ</text>
<line x1="145" y1="443" x2="175" y2="443" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="180" y="443" dominant-baseline="middle" fill="#5f5e5a">RREP</text>
<line x1="255" y1="443" x2="285" y2="443" stroke="#378ADD" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="290" y="443" dominant-baseline="middle" fill="#5f5e5a">Data</text>
</svg>
</div>
</body>
</html>
