<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AODV System Architecture</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #f8f7f4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
h1 { font-size: 18px; font-weight: 500; color: #2c2c2a; margin-bottom: 4px; text-align: center; }
p.sub { font-size: 13px; color: #888780; margin-bottom: 20px; text-align: center; }
.card {
  background: #fff;
  border-radius: 16px;
  border: 1px solid rgba(0,0,0,0.08);
  padding: 24px;
  max-width: 720px;
  width: 100%;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
svg { width: 100%; height: auto; }
@media (prefers-color-scheme: dark) {
  body { background: #1a1a18; }
  .card { background: #242422; border-color: rgba(255,255,255,0.08); }
  h1 { color: #e2e0d6; }
  p.sub { color: #888780; }
}
</style>
</head>
<body>
<h1>AODV System Architecture</h1>
<p class="sub">Implementation and Analysis of AODV Routing Protocol using AODV-UU on Linux</p>
<div class="card">
<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .ts { font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; }
    .th { font-family:'Segoe UI',system-ui,sans-serif; font-size:14px; font-weight:500; }
  </style>
</defs>

<!-- Linux host outer container -->
<rect x="20" y="20" width="640" height="500" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5" fill-opacity="0.4"/>
<text class="th" x="40" y="48" fill="#2C2C2A">Linux host (Ubuntu)</text>
<text class="ts" x="40" y="64" fill="#5F5E5A">ip netns - virtual network namespaces</text>

<!-- Node A -->
<rect x="50" y="90" width="140" height="80" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="120" y="105" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Node A</text>
<text class="ts" x="120" y="125" text-anchor="middle" dominant-baseline="central" fill="#185FA5">AODV-UU daemon</text>
<text class="ts" x="120" y="140" text-anchor="middle" dominant-baseline="central" fill="#E24B4A">iptables + NFQUEUE</text>
<text class="ts" x="120" y="155" text-anchor="middle" dominant-baseline="central" fill="#185FA5">netns: ns-A</text>

<!-- Node B -->
<rect x="270" y="90" width="140" height="80" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="340" y="105" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Node B</text>
<text class="ts" x="340" y="125" text-anchor="middle" dominant-baseline="central" fill="#185FA5">AODV-UU daemon</text>
<text class="ts" x="340" y="140" text-anchor="middle" dominant-baseline="central" fill="#E24B4A">iptables + NFQUEUE</text>
<text class="ts" x="340" y="155" text-anchor="middle" dominant-baseline="central" fill="#185FA5">netns: ns-B</text>

<!-- Node C -->
<rect x="490" y="90" width="140" height="80" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="560" y="105" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Node C</text>
<text class="ts" x="560" y="125" text-anchor="middle" dominant-baseline="central" fill="#185FA5">AODV-UU daemon</text>
<text class="ts" x="560" y="140" text-anchor="middle" dominant-baseline="central" fill="#E24B4A">iptables + NFQUEUE</text>
<text class="ts" x="560" y="155" text-anchor="middle" dominant-baseline="central" fill="#185FA5">netns: ns-C</text>

<!-- veth pair A-B -->
<line x1="190" y1="130" x2="270" y2="130" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text class="ts" x="230" y="122" text-anchor="middle" fill="#185FA5">veth pair</text>

<!-- veth pair B-C -->
<line x1="410" y1="130" x2="490" y2="130" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text class="ts" x="450" y="122" text-anchor="middle" fill="#185FA5">veth pair</text>

<!-- AODV control messages layer -->
<rect x="50" y="220" width="580" height="60" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" fill-opacity="0.3"/>
<text class="th" x="340" y="236" text-anchor="middle" dominant-baseline="central" fill="#085041">AODV control messages (UDP port 654)</text>
<text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">RREQ broadcast · RREP unicast · RERR unicast · HELLO</text>

<!-- Capture and analysis -->
<rect x="50" y="330" width="270" height="70" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text class="th" x="185" y="345" text-anchor="middle" dominant-baseline="central" fill="#633806">Capture &amp; analysis</text>
<text class="ts" x="185" y="369" text-anchor="middle" dominant-baseline="central" fill="#854F0B">tcpdump · Wireshark</text>
<text class="ts" x="185" y="385" text-anchor="middle" dominant-baseline="central" fill="#854F0B">log trace tu AODV-UU</text>

<!-- Performance metrics -->
<rect x="360" y="330" width="270" height="70" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="495" y="345" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Do hieu nang</text>
<text class="ts" x="495" y="369" text-anchor="middle" dominant-baseline="central" fill="#712B13">delay · packet loss</text>
<text class="ts" x="495" y="385" text-anchor="middle" dominant-baseline="central" fill="#712B13">throughput · overhead</text>

<!-- Bash scripts -->
<rect x="50" y="440" width="580" height="60" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="340" y="460" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Bash scripts</text>
<text class="ts" x="340" y="476" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">setup topology · inject traffic · trigger link failure · collect metrics</text>

<!-- Connectors -->
<line x1="340" y1="170" x2="340" y2="218" stroke="#888780" stroke-width="0.5" opacity="0.6" marker-end="url(#arrow)"/>
<line x1="185" y1="280" x2="185" y2="328" stroke="#888780" stroke-width="0.5" opacity="0.6" marker-end="url(#arrow)"/>
<line x1="495" y1="280" x2="495" y2="328" stroke="#888780" stroke-width="0.5" opacity="0.6" marker-end="url(#arrow)"/>
<line x1="340" y1="400" x2="340" y2="438" stroke="#888780" stroke-width="0.5" opacity="0.6" marker-end="url(#arrow)"/>
</svg>
</div>
</body>
</html>
